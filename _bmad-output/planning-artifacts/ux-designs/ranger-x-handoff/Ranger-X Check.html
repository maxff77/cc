  @media (max-width: 1240px) {
    .envio-grid { grid-template-columns: 320px minmax(0,1fr) minmax(0,1fr) !important; }
  }
  @media (max-width: 1000px) {
    .envio-grid, .detalle-grid, .usuarios-grid { grid-template-columns: minmax(0,1fr) !important; }

  }
  .rx-btn:hover { transform: translateY(-1px); }
  .rx-btn:active { transform: translateY(0); }
  a { color: var(--accent); }
</style>
